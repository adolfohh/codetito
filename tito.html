<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHAMPAGNE - Tito Double P | Visualizador</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;700&family=Great+Vibes&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: #000;
            overflow: hidden;
            cursor: pointer;
        }
        #visualizer-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        .content-overlay {
            position: relative;
            z-index: 2;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-shadow: 0 0 15px rgba(255, 215, 0, 0.7);
        }
        .title {
            font-family: 'Great Vibes', cursive;
            font-size: 6rem;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 1s ease-out, transform 1s ease-out;
        }
        .artist {
            font-size: 1.5rem;
            letter-spacing: 2px;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 1s ease-out 0.5s, transform 1s ease-out 0.5s;
        }
        .message {
            margin-top: 2rem;
            font-size: 1rem;
            opacity: 1;
            transition: opacity 1s ease;
        }
        .loaded .title, .loaded .artist {
            opacity: 1;
            transform: translateY(0);
        }
        /* Efecto de destello */
        .flash-effect {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(255,223,186,0.5) 0%, rgba(255,215,0,0) 70%);
            z-index: 3;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.1s ease-in-out;
        }
    </style>
</head>
<body class="bg-black text-white">

    <canvas id="visualizer-canvas"></canvas>
    <div class="flash-effect" id="flash-effect"></div>

    <div id="content" class="content-overlay">
        <h1 id="song-title" class="title">Champagne</h1>
        <p id="song-artist" class="artist">Tito Double P</p>
        <p id="message" class="message">Haz clic en cualquier lugar para iniciar la experiencia</p>
    </div>

    <!-- 
      IMPORTANTE: Reemplaza 'TU_CANCION.mp3' con la ruta a tu archivo de audio.
      Por motivos de derechos de autor, no puedo incluir el archivo de la canción directamente.
    -->
    <audio id="audio-player" src="Champagne - Tito Double P (Video Oficial) [Oq52pyIU1D8].mp3"></audio>

    <script>
        // --- CONFIGURACIÓN DEL CANVAS Y PARTÍCULAS ---
        const canvas = document.getElementById('visualizer-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let hue = 0;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class Particle {
            constructor(x, y, color, speed) {
                this.x = x || canvas.width / 2;
                this.y = y || canvas.height + 50;
                this.color = color || `hsl(${hue}, 100%, 70%)`;
                this.size = Math.random() * 5 + 1;
                this.speedX = Math.random() * 3 - 1.5;
                this.speedY = Math.random() * -3 - 1; // Moverse siempre hacia arriba
                this.life = Math.random() * 200 + 100;
                this.opacity = 1;
            }

            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.life -= 1;
                if (this.life < 50) {
                    this.opacity -= 0.02;
                }
            }

            draw() {
                ctx.globalAlpha = this.opacity < 0 ? 0 : this.opacity;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1; // Restaurar alpha
            }
        }
        
        let particleCreationRate = 0; // Se controlará con la música

        function handleParticles() {
            for(let i = 0; i < particleCreationRate; i++) {
                particles.push(new Particle(canvas.width / 2, canvas.height, `hsl(${Math.random() * 60 + 20}, 100%, 70%)`));
            }

            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                particles[i].draw();
                if (particles[i].life <= 0 || particles[i].opacity <= 0) {
                    particles.splice(i, 1);
                }
            }
        }

        // --- LÓGICA DE AUDIO Y SINCRONIZACIÓN ---
        const audioPlayer = document.getElementById('audio-player');
        const content = document.getElementById('content');
        const message = document.getElementById('message');
        const flashEffect = document.getElementById('flash-effect');
        let hasStarted = false;

        function playMusic() {
            if (hasStarted) return;
            if (audioPlayer.src.includes('TU_CANCION.mp3')) {
                message.textContent = 'Por favor, añade tu archivo de audio en el código HTML.';
                message.style.color = '#ff4d4d';
                return;
            }
            audioPlayer.play();
            hasStarted = true;
            content.classList.add('loaded');
            message.style.opacity = '0';
        }
        
        document.body.addEventListener('click', playMusic);
        
        let lastFlashTime = 0;

        audioPlayer.addEventListener('timeupdate', () => {
            const time = audioPlayer.currentTime;
            
            // Escena 1: Intro tranquila (0 - 15s)
            // Burbujas lentas desde abajo
            if (time < 15) {
                particleCreationRate = 1;
            }
            // Escena 2: Sube el ritmo (15s - 45s)
            // Más burbujas, empieza a sentirse la energía
            else if (time >= 15 && time < 45) {
                particleCreationRate = 3;
            }
            // Escena 3: Estribillo / Climax (45s - 1:15)
            // Explosión de partículas y destellos
            else if (time >= 45 && time < 75) {
                particleCreationRate = 10;
                 if (time - lastFlashTime > 0.4) { // Controla la frecuencia del destello
                    flashEffect.style.opacity = '1';
                    setTimeout(() => { flashEffect.style.opacity = '0'; }, 100);
                    lastFlashTime = time;
                }
            }
            // Escena 4: Puente / Calma (1:15 - 1:45)
            // Baja la intensidad
            else if (time >= 75 && time < 105) {
                 particleCreationRate = 2;
            }
             // Escena 5: Final (1:45 en adelante)
            // Gran final con más destellos y partículas
            else {
                particleCreationRate = 15;
                 if (time - lastFlashTime > 0.3) {
                    flashEffect.style.opacity = '1';
                    setTimeout(() => { flashEffect.style.opacity = '0'; }, 100);
                    lastFlashTime = time;
                }
            }
        });

        audioPlayer.addEventListener('ended', () => {
            particleCreationRate = 0;
            message.textContent = "Fin. Gracias por escuchar.";
            message.style.opacity = '1';
        });

        // --- BUCLE DE ANIMACIÓN ---
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            hue = (hue + 0.5) % 360; // Cambia el color lentamente
            handleParticles();
            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
